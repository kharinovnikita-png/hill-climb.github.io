<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover, touch-action=manipulation">
  <title>Hill Climb Racing</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff4400">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hill Climb Racing">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      font-family: 'Arial', sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
      position: fixed;
      width: 100vw;
      height: 100vh;
    }
    .game-container { 
      display: flex; 
      flex-direction: column; 
      width: 100%;
      height: 100%;
    }
    .desktop-panel {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
      color: #ffaa00;
      font-weight: bold;
      font-size: 0.7rem;
      background: #111;
      padding: 4px 8px;
      border-bottom: 1px solid #ff4400;
      z-index: 5;
    }
    .desktop-panel span { color: #ffd700; }
    .desktop-panel button {
      background: #ff4400;
      color: #000;
      border: none;
      padding: 3px 8px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.7rem;
    }
    .desktop-panel button:active { background: #ff6600; }
    .desktop-panel .reset-btn { background: #333; color: #fff; }
    .desktop-levels {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      justify-content: center;
      padding: 2px 4px;
      background: #0a0a0a;
      border-bottom: 1px solid #222;
      z-index: 5;
    }
    .desktop-levels button {
      padding: 2px 5px;
      background: #111;
      color: #ff4400;
      border: 1px solid #ff4400;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      font-size: 7px;
    }
    .desktop-levels button.active { background: #cc3300; color: #fff; }
    .desktop-levels button.endless { background: #220044; color: #cc88ff; border-color: #cc88ff; }
    .desktop-info {
      text-align: center;
      color: #ff4400;
      font-weight: bold;
      font-size: 0.6rem;
      padding: 1px;
      background: #000;
      z-index: 5;
    }
    .game-wrapper {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      min-height: 0;
      overflow: hidden;
    }
    canvas { 
      display: block; 
      max-width: 100%; 
      max-height: 100%;
      touch-action: manipulation;
    }
    .fullscreen-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid #ff4400;
      padding: 3px 7px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.65rem;
      z-index: 30;
    }
    .fullscreen-btn:active { background: #ff4400; color: #000; }
    .mobile-top-panel {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 5px 8px;
      z-index: 25;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 3px;
      border-bottom: 1px solid rgba(255,68,0,0.4);
    }
    .mobile-top-panel .panel-row {
      display: flex;
      gap: 8px;
      align-items: center;
      color: #ffaa00;
      font-size: 0.6rem;
      font-weight: bold;
      flex-wrap: wrap;
    }
    .mobile-top-panel .panel-row span { color: #ffd700; }
    .mobile-top-panel .panel-btns { display: flex; gap: 3px; }
    .mobile-top-panel button {
      background: rgba(255,68,0,0.7);
      color: #000;
      border: none;
      padding: 2px 6px;
      font-weight: bold;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.55rem;
    }
    .mobile-top-panel button:active { background: #ff6600; }
    .mobile-levels-row {
      display: none;
      position: absolute;
      top: 28px;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      padding: 3px 5px;
      z-index: 24;
      flex-wrap: wrap;
      gap: 1px;
      justify-content: center;
      border-bottom: 1px solid rgba(255,68,0,0.3);
    }
    .mobile-levels-row button {
      padding: 1px 4px;
      background: #111;
      color: #ff4400;
      border: 1px solid #ff4400;
      border-radius: 2px;
      cursor: pointer;
      font-weight: bold;
      font-size: 6px;
    }
    .mobile-levels-row button.active { background: #cc3300; color: #fff; }
    .mobile-levels-row button.endless { background: #220044; color: #cc88ff; border-color: #cc88ff; }

    /* Сенсорные кнопки */
    .touch-controls { 
      display: none; 
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      z-index: 20;
      pointer-events: none;
    }
    .touch-controls-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 12px;
      pointer-events: none;
    }
    .touch-pedal {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.35);
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.1s;
      pointer-events: auto;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .touch-pedal:active { transform: scale(0.88); color: #fff; }
    .touch-pedal.gas { border-color: rgba(0,255,0,0.35); }
    .touch-pedal.gas:active { background: rgba(0,180,0,0.5); border-color: rgba(0,255,0,0.6); }
    .touch-pedal.brake { border-color: rgba(255,0,0,0.35); }
    .touch-pedal.brake:active { background: rgba(180,0,0,0.5); border-color: rgba(255,0,0,0.6); }
    .touch-tilt-group { display: flex; gap: 8px; pointer-events: auto; }
    .touch-tilt-btn {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.1s;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .touch-tilt-btn:active {
      background: rgba(255,150,0,0.5);
      border-color: rgba(255,150,0,0.7);
      transform: scale(0.88);
      color: #fff;
    }

    /* Кнопка установки PWA */
    .install-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff4400;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      z-index: 300;
      box-shadow: 0 0 20px rgba(255,68,0,0.7);
      display: none;
    }
    .install-btn.show { display: block; }

    @media (max-width: 768px) {
      .desktop-panel, .desktop-levels, .desktop-info { display: none; }
      .touch-controls { display: block; }
      .mobile-top-panel { display: flex; }
      .mobile-levels-row { display: flex; }
    }

    @media (min-width: 769px) {
      .touch-controls { display: none; }
      .mobile-top-panel { display: none; }
      .mobile-levels-row { display: none; }
      .desktop-panel { display: flex; }
      .desktop-levels { display: flex; }
      .desktop-info { display: block; }
    }

    /* Остальные стили (game-overlay, garage и т.д.) */
    .game-overlay {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 50; justify-content: center; align-items: center;
      flex-direction: column; backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    }
    .game-overlay.active { display: flex; }
    .game-overlay-box {
      background: #0a0000; border: 2px solid #ff4400; border-radius: 12px; padding: 18px 25px;
      text-align: center; box-shadow: 0 0 80px rgba(255,100,0,0.7); max-width: 90%;
      animation: popIn 0.3s ease-out;
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .game-overlay-title { font-size: 1.5rem; font-weight: bold; color: #ff4400; margin-bottom: 8px; }
    .game-overlay-stats { font-size: 0.75rem; color: #aaa; margin-bottom: 12px; }
    .game-overlay-btn {
      background: #ff4400; color: #000; border: none; padding: 10px 22px; font-size: 0.9rem;
      font-weight: bold; border-radius: 10px; cursor: pointer; margin: 3px; transition: all 0.2s;
    }
    .game-overlay-btn.green { background: #008800; color: #fff; }
    .garage-overlay {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.98); z-index: 100; justify-content: center; align-items: center;
      flex-direction: column; overflow-y: auto;
    }
    .garage-overlay.active { display: flex; }
    .garage-container {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); border: 2px solid #ff4400;
      border-radius: 10px; padding: 12px; max-width: 600px; width: 95%;
      box-shadow: 0 0 60px rgba(255,100,0,0.5); max-height: 90%; overflow-y: auto;
    }
    .garage-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .garage-title {
      font-size: 1.3rem; font-weight: bold; background: linear-gradient(45deg, #ff4400, #ff8800);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .garage-close {
      background: #ff4400; color: #000; border: none; width: 28px; height: 28px;
      font-size: 0.9rem; font-weight: bold; border-radius: 50%; cursor: pointer;
    }
    .cars-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
    .car-card {
      background: rgba(0,0,0,0.5); border: 2px solid #333; border-radius: 8px; padding: 8px;
      width: 130px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative;
    }
    .car-card.selected { border-color: #ff4400; box-shadow: 0 0 15px rgba(255,100,0,0.4); }
    .car-card.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
    .car-icon { font-size: 2.2rem; margin: 3px 0; }
    .car-name { font-weight: bold; color: #fff; font-size: 0.8rem; }
    .car-desc { color: #888; font-size: 0.55rem; margin: 2px 0; }
    .car-lock { position: absolute; top: 5px; right: 5px; color: #ff4400; font-size: 0.9rem; }
    .upgrades-section { background: rgba(0,0,0,0.4); border-radius: 8px; padding: 10px; margin-bottom: 12px; }
    .upgrades-title { color: #ffaa00; font-weight: bold; font-size: 0.9rem; margin-bottom: 10px; text-align: center; }
    .upgrade-item {
      display: flex; align-items: center; justify-content: space-between; padding: 6px;
      background: rgba(255,255,255,0.03); border-radius: 6px; margin-bottom: 5px;
    }
    .upgrade-info { flex: 1; }
    .upgrade-name { color: #fff; font-weight: bold; font-size: 0.75rem; }
    .upgrade-level { color: #ffaa00; font-size: 0.55rem; }
    .upgrade-bar { width: 100%; height: 4px; background: #222; border-radius: 2px; margin-top: 2px; overflow: hidden; }
    .upgrade-fill { height: 100%; background: linear-gradient(90deg, #ff4400, #ff8800); }
    .upgrade-btn {
      background: #ff4400; color: #000; border: none; padding: 4px 10px; font-weight: bold;
      border-radius: 5px; cursor: pointer; font-size: 0.65rem; white-space: nowrap;
    }
    .upgrade-btn.maxed { background: #333; color: #666; cursor: default; }
    .garage-footer { display: flex; justify-content: space-between; align-items: center; color: #ffd700; font-weight: bold; flex-wrap: wrap; gap: 6px; font-size: 0.7rem; }
    .save-indicator { color: #0f0; font-size: 0.55rem; opacity: 0; transition: opacity 0.3s; }
    .save-indicator.show { opacity: 1; }
    .reset-overlay {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 101; justify-content: center; align-items: center;
      flex-direction: column;
    }
    .reset-overlay.active { display: flex; }
    .reset-overlay-box {
      background: #0a0000; border: 2px solid #ff4400; border-radius: 12px; padding: 18px 25px;
      text-align: center; box-shadow: 0 0 80px rgba(255,100,0,0.7); max-width: 90%;
    }
    .reset-overlay-title { font-size: 1.3rem; font-weight: bold; color: #ff4400; margin-bottom: 8px; }
    .reset-overlay-stats { font-size: 0.7rem; color: #aaa; margin-bottom: 12px; }
    .reset-overlay-btn {
      background: #ff4400; color: #000; border: none; padding: 8px 18px; font-size: 0.8rem;
      font-weight: bold; border-radius: 10px; cursor: pointer; margin: 3px;
    }
  </style>
</head>
<body>
<div class="game-container" id="gameContainer">
  <div class="desktop-panel" id="desktopPanel">
    🏆 <span id="desktopCoinsDisplay">0</span>
    🚗 <span id="desktopCarDisplay">Джип</span>
    <button id="desktopGarageBtn">🔧 ГАРАЖ</button>
    <button class="reset-btn" id="desktopResetBtn">🗑️ Сброс</button>
    <span class="save-indicator" id="saveIndicator">💾</span>
  </div>
  <div class="desktop-levels" id="desktopLevels"></div>
  <div class="desktop-info" id="desktopInfo">
    🏔️ HILL CLIMB RACING | Ур: <span id="desktopLevelDisplay">1</span> | <span id="desktopSpeedDisplay">0</span> км/ч | ⛽<span id="desktopFuelDisplay">100</span>%
  </div>

  <div class="game-wrapper" id="gameWrapper">
    <button class="fullscreen-btn" id="fullscreenBtn" title="Полноэкранный режим (F)">⛶</button>
    <canvas id="gameCanvas" width="900" height="500"></canvas>

    <div class="mobile-top-panel" id="mobileTopPanel">
      <div class="panel-row">
        🏆 <span id="mobileCoinsDisplay">0</span>
        🚗 <span id="mobileCarDisplay">Джип</span>
        ⛽<span id="mobileFuelDisplay">100</span>%
      </div>
      <div class="panel-btns">
        <button id="mobileGarageBtn">🔧</button>
        <button id="mobileResetBtn">🗑️</button>
        <button id="mobileLevelsToggle">📋</button>
      </div>
    </div>
    <div class="mobile-levels-row" id="mobileLevelsRow"></div>

    <div class="game-overlay" id="winOverlay">
      <div class="game-overlay-box">
        <div class="game-overlay-title">🏆 УРОВЕНЬ ПРОЙДЕН!</div>
        <div class="game-overlay-stats" id="winStats"></div>
        <button class="game-overlay-btn green" id="nextLevelBtn">▶ ДАЛЬШЕ</button>
        <button class="game-overlay-btn" id="winRestartBtn">🔄 ЗАНОВО</button>
      </div>
    </div>
    <div class="game-overlay" id="gameoverOverlay">
      <div class="game-overlay-box">
        <div class="game-overlay-title">💀 КРУШЕНИЕ!</div>
        <div class="game-overlay-stats" id="gameoverStats"></div>
        <button class="game-overlay-btn" id="restartBtn">🔄 ЗАНОВО</button>
      </div>
    </div>
    <div class="game-overlay" id="outOfFuelOverlay">
      <div class="game-overlay-box">
        <div class="game-overlay-title">⛽ ТОПЛИВО КОНЧИЛОСЬ!</div>
        <div class="game-overlay-stats" id="fuelStats"></div>
        <button class="game-overlay-btn" id="fuelRestartBtn">🔄 ЗАНОВО</button>
      </div>
    </div>

    <div class="garage-overlay" id="garageOverlay">
      <div class="garage-container">
        <div class="garage-header">
          <div class="garage-title">🔧 ГАРАЖ</div>
          <button class="garage-close" id="closeGarageBtn">✕</button>
        </div>
        <div class="cars-row" id="carsRow"></div>
        <div class="upgrades-section">
          <div class="upgrades-title">⚡ УЛУЧШЕНИЯ</div>
          <div id="upgradesList"></div>
        </div>
        <div class="garage-footer">
          <span>💰 Монеты: <span id="garageCoins">0</span></span>
          <span id="carStatus"></span>
          <span class="save-indicator" id="garageSaveIndicator">💾 Автосохранение</span>
        </div>
      </div>
    </div>

    <div class="reset-overlay" id="resetConfirmOverlay">
      <div class="reset-overlay-box">
        <div class="reset-overlay-title">⚠️ СБРОС ПРОГРЕССА</div>
        <div class="reset-overlay-stats">Все монеты и улучшения будут потеряны!</div>
        <button class="reset-overlay-btn" id="confirmResetBtn" style="background:#ff0000;">🗑️ СБРОСИТЬ</button>
        <button class="reset-overlay-btn" id="cancelResetBtn">❌ ОТМЕНА</button>
      </div>
    </div>

    <div class="touch-controls" id="touchControls">
      <div class="touch-controls-inner">
        <button class="touch-pedal brake" id="btnBrake">◀</button>
        <div class="touch-tilt-group">
          <button class="touch-tilt-btn" id="btnTiltUp">▲</button>
          <button class="touch-tilt-btn" id="btnTiltDown">▼</button>
        </div>
        <button class="touch-pedal gas" id="btnGas">▶</button>
      </div>
    </div>
  </div>
</div>

<button id="installBtn" class="install-btn">📲 Установить игру</button>

<script>
  // ===== PWA install =====
  let deferredPrompt;
  const installBtn = document.getElementById('installBtn');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.classList.add('show');
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log(`User response: ${outcome}`);
    deferredPrompt = null;
    installBtn.classList.remove('show');
  });
  window.addEventListener('appinstalled', () => {
    installBtn.classList.remove('show');
    console.log('PWA installed');
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('✅ SW registered'))
      .catch(err => console.error('❌ SW error:', err));
  }

  // ===== ИГРОВОЙ КОД =====
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 900, H = 500;
    const GRAVITY = 0.65;
    const ENGINE_POWER = 0.55;
    const BRAKE_POWER = 0.8;
    const AIR_FRICTION = 0.997;
    const MAX_SPEED = 9.5;
    const MAX_REVERSE = 1.5;
    const keys = {};
    let cameraX = 0, gameOver = false, outOfFuel = false, levelComplete = false;
    let distance = 0, coins = 0, totalCoins = 0;
    let currentLevel = 1, isEndless = false, finishLineX = 999999;
    let fuel = 100, gameStarted = false, airTime = 0, maxAirTime = 0;
    let generatedTerrainLength = 0;
    let currentCarIndex = 0;
    let saveTimeout = null;
    let isFullscreen = false;
    let mobileLevelsVisible = true;

    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                     (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);

    const carsConfig = [
      { id: 0, name: 'Джип', icon: '🚙', desc: 'Надёжный внедорожник', color: '#ff3300', unlocked: true,
        maxUpgrades: { engine: 4, tires: 4, fuel: 4 },
        upgradeCosts: { engine: [0,30,80,200,500], tires: [0,25,70,180,450], fuel: [0,20,60,150,400] },
        stats: { engine: 1.0, tires: 1.0, fuel: 1.0 }, upgradeLevels: { engine: 0, tires: 0, fuel: 0 } },
      { id: 1, name: 'Монстр-трак', icon: '🚛', desc: 'Огромные колёса!', color: '#00aa00', unlocked: false,
        maxUpgrades: { engine: 5, tires: 5, fuel: 5 },
        upgradeCosts: { engine: [0,60,150,350,800,1500], tires: [0,50,130,300,700,1300], fuel: [0,45,120,280,650,1200] },
        stats: { engine: 1.3, tires: 1.4, fuel: 1.2 }, upgradeLevels: { engine: 0, tires: 0, fuel: 0 } },
      { id: 2, name: 'Гоночный болид', icon: '🏎️', desc: 'Скорость и мощь!', color: '#ffdd00', unlocked: false,
        maxUpgrades: { engine: 6, tires: 6, fuel: 6 },
        upgradeCosts: { engine: [0,120,300,700,1500,3000,6000], tires: [0,100,260,600,1300,2600,5200], fuel: [0,90,240,550,1200,2400,4800] },
        stats: { engine: 1.6, tires: 1.5, fuel: 1.4 }, upgradeLevels: { engine: 0, tires: 0, fuel: 0 } }
    ];

    function saveGameData(immediate = false) {
      if (!immediate && saveTimeout) clearTimeout(saveTimeout);
      const doSave = () => {
        try {
          localStorage.setItem('hcr_garage', JSON.stringify({
            totalCoins, currentCarIndex,
            cars: carsConfig.map(c => ({ unlocked: c.unlocked, upgradeLevels: c.upgradeLevels })),
            version: '4.0'
          }));
          document.getElementById('saveIndicator').classList.add('show');
          setTimeout(() => document.getElementById('saveIndicator').classList.remove('show'), 2000);
        } catch(e) {}
      };
      if (immediate) doSave();
      else saveTimeout = setTimeout(doSave, 500);
    }

    function loadGameData() {
      try {
        const saved = localStorage.getItem('hcr_garage');
        if (!saved) return;
        const data = JSON.parse(saved);
        if (typeof data.totalCoins === 'number') totalCoins = data.totalCoins;
        if (typeof data.currentCarIndex === 'number' && data.currentCarIndex < carsConfig.length) currentCarIndex = data.currentCarIndex;
        if (data.cars) data.cars.forEach((sc, i) => {
          if (carsConfig[i] && sc) {
            if (typeof sc.unlocked === 'boolean') carsConfig[i].unlocked = sc.unlocked;
            if (sc.upgradeLevels) carsConfig[i].upgradeLevels = { engine: sc.upgradeLevels.engine||0, tires: sc.upgradeLevels.tires||0, fuel: sc.upgradeLevels.fuel||0 };
            recalcStats(i);
          }
        });
        checkUnlock();
      } catch(e) {}
    }

    function recalcStats(i) {
      const c = carsConfig[i];
      c.stats.engine = 1.0 + c.upgradeLevels.engine * 0.2 * (1 + i * 0.25);
      c.stats.tires = 1.0 + c.upgradeLevels.tires * 0.2 * (1 + i * 0.25);
      c.stats.fuel = 1.0 + c.upgradeLevels.fuel * 0.08 * (1 + i * 0.2);
    }

    function resetAllProgress() {
      totalCoins = 0; currentCarIndex = 0;
      carsConfig.forEach((c, i) => { c.unlocked = (i===0); c.upgradeLevels = {engine:0,tires:0,fuel:0}; c.stats = {engine:1.0,tires:1.0,fuel:1.0}; });
      localStorage.removeItem('hcr_garage');
      resetCar(); updateAllUI();
      alert('Прогресс сброшен!');
    }

    function checkUnlock() {
      let u = false;
      for (let i = 0; i < carsConfig.length-1; i++) {
        if (!carsConfig[i+1].unlocked && Object.keys(carsConfig[i].maxUpgrades).every(k => carsConfig[i].upgradeLevels[k] >= carsConfig[i].maxUpgrades[k])) {
          carsConfig[i+1].unlocked = true; u = true;
        }
      }
      if (u) { saveGameData(true); updateAllUI(); }
    }

    function upgradePart(ci, part) {
      const c = carsConfig[ci];
      if (c.upgradeLevels[part] >= c.maxUpgrades[part]) return false;
      const cost = c.upgradeCosts[part][c.upgradeLevels[part]+1];
      if (totalCoins >= cost) {
        totalCoins -= cost; c.upgradeLevels[part]++; recalcStats(ci);
        saveGameData(true); checkUnlock(); updateAllUI();
        return true;
      }
      return false;
    }

    function getEnginePower() { return ENGINE_POWER * carsConfig[currentCarIndex].stats.engine; }
    function getTireGrip() { return carsConfig[currentCarIndex].stats.tires; }
    function getFuelCapacity() { return (isEndless?60:levelConfig.fuel||100) * carsConfig[currentCarIndex].stats.fuel; }

    function toggleFullscreen() {
      const container = document.getElementById('gameContainer');
      if (!isFullscreen) {
        if (container.requestFullscreen) container.requestFullscreen();
        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        container.classList.add('fullscreen-mode');
        document.getElementById('fullscreenBtn').textContent = '✕';
        isFullscreen = true;
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        container.classList.remove('fullscreen-mode');
        document.getElementById('fullscreenBtn').textContent = '⛶';
        isFullscreen = false;
        canvas.width = W; canvas.height = H;
      }
      setTimeout(resizeCanvas, 100);
    }

    function handleFullscreenChange() {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        document.getElementById('gameContainer').classList.remove('fullscreen-mode');
        document.getElementById('fullscreenBtn').textContent = '⛶';
        isFullscreen = false;
        canvas.width = W; canvas.height = H;
        resizeCanvas();
      }
    }

    function resizeCanvas() {
      const wrapper = document.getElementById('gameWrapper');
      const maxW = wrapper.clientWidth;
      const maxH = wrapper.clientHeight;
      const ratio = W / H;
      let nw, nh;
      if (maxW / maxH > ratio) { nh = maxH; nw = nh * ratio; }
      else { nw = maxW; nh = nw / ratio; }
      canvas.style.width = nw + 'px';
      canvas.style.height = nh + 'px';
    }

      btn.addEventListener('pointerup', e => { e.preventDefault(); keys[code] = false; });
      btn.addEventListener('pointerleave', () => { keys[code] = false; });
      btn.addEventListener('pointercancel', () => { keys[code] = false; });
      btn.addEventListener('contextmenu', e => e.preventDefault());
    }

    function resetCar() {
      const gy = getTerrainY(200);
      car.x = 200; car.y = gy - car.height * 0.5; car.vx = 0; car.vy = 0;
      car.angle = 0; car.angularVelocity = 0; car.wheelRotation = 0; car.onGround = true;

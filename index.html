<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover, touch-action=manipulation">
  <title>Hill Climb Racing - Гараж и прокачка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Arial', sans-serif;
      flex-direction: column;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    .game-container { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 3px; 
      padding: 3px;
      width: 100%;
      max-width: 100vw;
      height: 100vh;
      height: 100dvh;
    }
    .game-wrapper {
      box-shadow: 0 0 30px rgba(255,100,0,0.5);
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid #ff4400;
      position: relative;
      flex-shrink: 0;
      background: #000;
    }
    canvas { 
      display: block; 
      max-width: 100%; 
      height: auto;
      touch-action: manipulation;
    }
    .fullscreen-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid #ff4400;
      padding: 4px 8px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.7rem;
      z-index: 10;
      transition: all 0.3s;
    }
    .fullscreen-btn:hover { background: #ff4400; color: #000; }
    .menu-bar {
      display: flex; gap: 4px; align-items: center; flex-wrap: wrap;
      color: #ffaa00; font-weight: bold; font-size: 0.7rem;
      background: #111; padding: 4px 8px; border-radius: 6px; border: 1px solid #ff4400;
      z-index: 5;
    }
    .menu-bar span { color: #ffd700; }
    .garage-btn {
      background: #ff4400; color: #000; border: none;
      padding: 3px 8px; font-weight: bold; border-radius: 6px;
      cursor: pointer; font-size: 0.7rem;
    }
    .reset-btn {
      background: #333; color: #fff; border: none;
      padding: 3px 8px; font-weight: bold; border-radius: 6px;
      cursor: pointer; font-size: 0.7rem;
    }
    .level-select { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin: 1px 0; max-width: 100%; z-index: 5; }
    .level-btn {
      padding: 2px 5px; background: #111; color: #ff4400;
      border: 1px solid #ff4400; border-radius: 3px;
      cursor: pointer; font-weight: bold; font-size: 7px; transition: all 0.2s;
    }
    .level-btn.active { background: #cc3300; color: #fff; }
    .level-btn.endless { background: #220044; color: #cc88ff; border-color: #cc88ff; }
    .level-btn.endless.active { background: #6600cc; color: #fff; }
    .info { text-align: center; color: #ff4400; font-weight: bold; font-size: 0.65rem; z-index: 5; }
    .controls-panel { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; color: #666; font-size: 0.5rem; z-index: 5; }
    .controls-panel span { background: #0a0a0a; padding: 1px 4px; border-radius: 4px; border: 1px solid #222; }
    
    /* СЕНСОРНЫЕ КНОПКИ ПОВЕРХ ИГРЫ */
    .touch-controls { 
      display: none; 
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      z-index: 20;
      pointer-events: none;
    }
    .touch-controls-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 15px;
      max-width: 100%;
      margin: 0 auto;
      pointer-events: none;
    }
    .touch-pedal-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: auto;
    }
    .touch-pedal {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.4);
      color: rgba(255,255,255,0.7);
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.1s;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .touch-pedal:active {
      background: rgba(255,100,0,0.6);
      border-color: rgba(255,100,0,0.8);
      transform: scale(0.9);
      color: #fff;
    }
    .touch-pedal.gas { border-color: rgba(0,255,0,0.4); }
    .touch-pedal.gas:active { background: rgba(0,180,0,0.6); border-color: rgba(0,255,0,0.7); }
    .touch-pedal.brake { border-color: rgba(255,0,0,0.4); }
    .touch-pedal.brake:active { background: rgba(180,0,0,0.6); border-color: rgba(255,0,0,0.7); }
    .touch-tilt-group {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }
    .touch-tilt-btn {
      width: 45px;
      height: 45px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.35);
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.1s;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .touch-tilt-btn:active {
      background: rgba(255,150,0,0.6);
      border-color: rgba(255,150,0,0.8);
      transform: scale(0.9);
      color: #fff;
    }
    
    .overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.95);
      z-index: 100; justify-content: center; align-items: center; flex-direction: column;
    }
    .overlay.active { display: flex; }
    .overlay-box {
      background: #0a0000; border: 2px solid #ff4400;
      border-radius: 10px; padding: 15px 22px; text-align: center;
      box-shadow: 0 0 60px rgba(255,100,0,0.7);
      max-width: 90vw;
    }
    .overlay-title { font-size: 1.5rem; font-weight: bold; color: #ff4400; margin-bottom: 5px; }
    .overlay-stats { font-size: 0.7rem; color: #888; margin-bottom: 10px; }
    .overlay-btn {
      background: #ff4400; color: #000; border: none;
      padding: 7px 18px; font-size: 0.85rem; font-weight: bold;
      border-radius: 12px; cursor: pointer; margin: 2px;
    }
    .overlay-btn.green { background: #006600; color: #fff; }
   
    /* ГАРАЖ */
    .garage-overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.98);
      z-index: 200; justify-content: center; align-items: center; flex-direction: column;
      overflow-y: auto;
    }
    .garage-overlay.active { display: flex; }
    .garage-container {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      border: 3px solid #ff4400; border-radius: 12px;
      padding: 15px; max-width: 650px; width: 95%;
      box-shadow: 0 0 80px rgba(255,100,0,0.5);
      max-height: 90vh; overflow-y: auto;
    }
    .garage-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .garage-title {
      font-size: 1.5rem; font-weight: bold;
      background: linear-gradient(45deg, #ff4400, #ff8800);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .garage-close {
      background: #ff4400; color: #000; border: none;
      width: 30px; height: 30px; font-size: 1rem; font-weight: bold;
      border-radius: 50%; cursor: pointer;
    }
    .cars-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
    .car-card {
      background: rgba(0,0,0,0.5); border: 2px solid #333;
      border-radius: 10px; padding: 10px; width: 140px;
      text-align: center; cursor: pointer; transition: all 0.3s;
      position: relative;
    }
    .car-card.selected { border-color: #ff4400; box-shadow: 0 0 20px rgba(255,100,0,0.5); }
    .car-card.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
    .car-icon { font-size: 2.5rem; margin: 5px 0; }
    .car-name { font-weight: bold; color: #fff; font-size: 0.85rem; }
    .car-desc { color: #888; font-size: 0.6rem; margin: 3px 0; }
    .car-lock { position: absolute; top: 8px; right: 8px; color: #ff4400; font-size: 1rem; }
    .upgrades-section { background: rgba(0,0,0,0.4); border-radius: 10px; padding: 12px; margin-bottom: 15px; }
    .upgrades-title { color: #ffaa00; font-weight: bold; font-size: 1rem; margin-bottom: 12px; text-align: center; }
    .upgrade-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px; background: rgba(255,255,255,0.03);
      border-radius: 8px; margin-bottom: 6px;
    }
    .upgrade-info { flex: 1; }
    .upgrade-name { color: #fff; font-weight: bold; font-size: 0.8rem; }
    .upgrade-level { color: #ffaa00; font-size: 0.6rem; }
    .upgrade-bar { width: 100%; height: 5px; background: #222; border-radius: 3px; margin-top: 2px; overflow: hidden; }
    .upgrade-fill { height: 100%; background: linear-gradient(90deg, #ff4400, #ff8800); transition: width 0.3s; }
    .upgrade-btn {
      background: #ff4400; color: #000; border: none;
      padding: 5px 12px; font-weight: bold; border-radius: 6px;
      cursor: pointer; font-size: 0.7rem; white-space: nowrap;
    }
    .upgrade-btn.maxed { background: #333; color: #666; cursor: default; }
    .garage-footer {
      display: flex; justify-content: space-between; align-items: center;
      color: #ffd700; font-weight: bold; flex-wrap: wrap; gap: 8px;
    }
    .save-indicator { color: #0f0; font-size: 0.6rem; opacity: 0; transition: opacity 0.3s; }
    .save-indicator.show { opacity: 1; }
    
    /* ПОЛНОЭКРАННЫЙ РЕЖИМ ДЛЯ ТЕЛЕФОНОВ */
    .game-wrapper.fullscreen-mobile {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      width: 100dvw;
      height: 100dvh;
      z-index: 9999;
      border: none;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      margin: 0;
      padding: 0;
    }
    .game-wrapper.fullscreen-mobile canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .game-wrapper.fullscreen-mobile .fullscreen-btn {
      top: 10px;
      right: 10px;
      font-size: 0.8rem;
      padding: 6px 12px;
      z-index: 30;
    }
    .game-wrapper.fullscreen-mobile .touch-controls {
      display: block;
      bottom: 15px;
    }
    
    /* ПК полноэкранный режим */
    .game-wrapper.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      border: none;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .game-wrapper.fullscreen canvas { width: 100%; height: 100%; object-fit: contain; }
    
    @media (max-width: 768px) {
      .touch-controls { display: block; }
      .controls-panel { display: none; }
      .menu-bar { font-size: 0.6rem; gap: 3px; padding: 3px 5px; }
      .garage-btn, .reset-btn { font-size: 0.6rem; padding: 2px 6px; }
      .game-container { gap: 2px; padding: 2px; }
      .game-wrapper { border-width: 1px; }
    }
    
    @media (min-width: 769px) {
      .touch-controls { display: none; }
      .controls-panel { display: flex; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="menu-bar">
    🏆 <span id="totalCoinsDisplay">0</span>
    🚗 <span id="currentCarDisplay">Джип</span>
    <button class="garage-btn" id="openGarageBtn">🔧 ГАРАЖ</button>
    <button class="reset-btn" id="resetProgressBtn">🗑️ Сброс</button>
    <span class="save-indicator" id="saveIndicator">💾</span>
  </div>
  <div class="level-select" id="levelButtons"></div>
  <div class="game-wrapper" id="gameWrapper">
    <button class="fullscreen-btn" id="fullscreenBtn" title="Полноэкранный режим">⛶</button>
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    <div class="touch-controls" id="touchControls">
      <div class="touch-controls-inner">
        <div class="touch-pedal-group">
          <button class="touch-pedal brake" id="btnBrake">◀</button>
        </div>
        <div class="touch-tilt-group">
          <button class="touch-tilt-btn" id="btnTiltUp">▲</button>
          <button class="touch-tilt-btn" id="btnTiltDown">▼</button>
        </div>
        <div class="touch-pedal-group">
          <button class="touch-pedal gas" id="btnGas">▶</button>
        </div>
      </div>
    </div>
  </div>
  <div class="info" id="infoDisplay">🏔️ HILL CLIMB RACING | Ур: <span id="levelDisplay">1</span> | <span id="speedDisplay">0</span> км/ч | ⛽<span id="fuelDisplay">100</span>%</div>
  <div class="controls-panel" id="desktopControls"><span>→ газ</span><span>← тормоз</span><span>↑↓ наклон</span><span>R рестарт</span><span>F фулскрин</span></div>
</div>

<!-- ЭКРАНЫ -->
<div class="overlay" id="winOverlay"><div class="overlay-box"><div class="overlay-title">🏆 УРОВЕНЬ ПРОЙДЕН!</div><div class="overlay-stats" id="winStats"></div><button class="overlay-btn green" id="nextLevelBtn">▶ ДАЛЬШЕ</button><button class="overlay-btn" id="winRestartBtn">🔄 ЗАНОВО</button></div></div>
<div class="overlay" id="gameoverOverlay"><div class="overlay-box"><div class="overlay-title">💀 КРУШЕНИЕ!</div><div class="overlay-stats" id="gameoverStats"></div><button class="overlay-btn" id="restartBtn">🔄 ЗАНОВО</button></div></div>
<div class="overlay" id="outOfFuelOverlay"><div class="overlay-box"><div class="overlay-title">⛽ ТОПЛИВО КОНЧИЛОСЬ!</div><div class="overlay-stats" id="fuelStats"></div><button class="overlay-btn" id="fuelRestartBtn">🔄 ЗАНОВО</button></div></div>
<div class="overlay" id="resetConfirmOverlay"><div class="overlay-box"><div class="overlay-title">⚠️ СБРОС ПРОГРЕССА</div><div class="overlay-stats">Вы уверены? Все монеты и улучшения будут потеряны!</div><button class="overlay-btn" id="confirmResetBtn" style="background:#ff0000;">🗑️ СБРОСИТЬ</button><button class="overlay-btn" id="cancelResetBtn">❌ ОТМЕНА</button></div></div>

<!-- ГАРАЖ -->
<div class="garage-overlay" id="garageOverlay">
  <div class="garage-container">
    <div class="garage-header">
      <div class="garage-title">🔧 ГАРАЖ</div>
      <button class="garage-close" id="closeGarageBtn">✕</button>
    </div>
    <div class="cars-row" id="carsRow"></div>
    <div class="upgrades-section" id="upgradesSection">
      <div class="upgrades-title">⚡ УЛУЧШЕНИЯ</div>
      <div id="upgradesList"></div>
    </div>
    <div class="garage-footer">
      <span>💰 Монеты: <span id="garageCoins">0</span></span>
      <span id="carStatus"></span>
      <span class="save-indicator" id="garageSaveIndicator">💾 Автосохранение</span>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W=900, H=500;
  
  const GRAVITY=0.65;
  const ENGINE_POWER=0.55;
  const BRAKE_POWER=0.8;
  const AIR_FRICTION=0.997;
  const MAX_SPEED=9.5;
  const MAX_REVERSE=1.5;
  
  const keys={};
  let cameraX=0, gameOver=false, outOfFuel=false, levelComplete=false, distance=0, coins=0, totalCoins=0;
  let currentLevel=1, isEndless=false, finishLineX=999999, fuel=100, gameStarted=false, airTime=0, maxAirTime=0, generatedTerrainLength=0;
  let currentCarIndex=0;
  let saveTimeout = null;
  let isFullscreen = false;
  let isMobileFullscreen = false;

  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                   (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);

  // ===== СИСТЕМА МАШИН И ПРОКАЧКИ =====
  const carsConfig = [
    {
      id: 0, name: 'Джип', icon: '🚙', desc: 'Надёжный внедорожник',
      color: '#ff3300', unlocked: true,
      maxUpgrades: { engine: 4, tires: 4, fuel: 4 },
      upgradeCosts: {
        engine: [0, 30, 80, 200, 500],
        tires: [0, 25, 70, 180, 450],
        fuel: [0, 20, 60, 150, 400]
      },
      stats: { engine: 1.0, tires: 1.0, fuel: 1.0 },
      upgradeLevels: { engine: 0, tires: 0, fuel: 0 }
    },
    {
      id: 1, name: 'Монстр-трак', icon: '🚛', desc: 'Огромные колёса!',
      color: '#00aa00', unlocked: false,
      maxUpgrades: { engine: 5, tires: 5, fuel: 5 },
      upgradeCosts: {
        engine: [0, 60, 150, 350, 800, 1500],
        tires: [0, 50, 130, 300, 700, 1300],
        fuel: [0, 45, 120, 280, 650, 1200]
      },
      stats: { engine: 1.3, tires: 1.4, fuel: 1.2 },
      upgradeLevels: { engine: 0, tires: 0, fuel: 0 }
    },
    {
      id: 2, name: 'Гоночный болид', icon: '🏎️', desc: 'Скорость и мощь!',
      color: '#ffdd00', unlocked: false,
      maxUpgrades: { engine: 6, tires: 6, fuel: 6 },
      upgradeCosts: {
        engine: [0, 120, 300, 700, 1500, 3000, 6000],
        tires: [0, 100, 260, 600, 1300, 2600, 5200],
        fuel: [0, 90, 240, 550, 1200, 2400, 4800]
      },
      stats: { engine: 1.6, tires: 1.5, fuel: 1.4 },
      upgradeLevels: { engine: 0, tires: 0, fuel: 0 }
    }
  ];

  function showSaveIndicator(elementId) {
    const el = document.getElementById(elementId);
    if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000); }
  }

  function saveGameData(immediate = false) {
    if (!immediate && saveTimeout) clearTimeout(saveTimeout);
    if (!immediate) { saveTimeout = setTimeout(() => performSave(), 500); }
    else { performSave(); }
  }

  function performSave() {
    try {
      const data = {
        totalCoins, currentCarIndex,
        cars: carsConfig.map(c => ({ unlocked: c.unlocked, upgradeLevels: c.upgradeLevels })),
        timestamp: Date.now(), version: '2.1'
      };
      localStorage.setItem('hcr_garage', JSON.stringify(data));
      showSaveIndicator('saveIndicator');
      showSaveIndicator('garageSaveIndicator');
      return true;
    } catch(e) { return false; }
  }

  function loadGameData() {
    try {
      const saved = localStorage.getItem('hcr_garage');
      if (saved) {
        const data = JSON.parse(saved);
        if (typeof data.totalCoins === 'number' && data.totalCoins >= 0) totalCoins = data.totalCoins;
        if (typeof data.currentCarIndex === 'number' && data.currentCarIndex >= 0 && data.currentCarIndex < carsConfig.length) currentCarIndex = data.currentCarIndex;
        if (data.cars && Array.isArray(data.cars)) {
          data.cars.forEach((sc, i) => {
            if (carsConfig[i] && sc) {
              if (typeof sc.unlocked === 'boolean') carsConfig[i].unlocked = sc.unlocked;
              if (sc.upgradeLevels) {
                carsConfig[i].upgradeLevels = {
                  engine: sc.upgradeLevels.engine || 0,
                  tires: sc.upgradeLevels.tires || 0,
                  fuel: sc.upgradeLevels.fuel || 0
                };
                recalculateCarStats(i);
              }
            }
          });
        }
        checkAndUnlockNextCar();
        return true;
      }
      return false;
    } catch(e) { return false; }
  }

  function recalculateCarStats(i) {
    const c = carsConfig[i];
    c.stats.engine = 1.0 + c.upgradeLevels.engine * 0.2 * (1 + i * 0.25);
    c.stats.tires = 1.0 + c.upgradeLevels.tires * 0.2 * (1 + i * 0.25);
    c.stats.fuel = 1.0 + c.upgradeLevels.fuel * 0.2 * (1 + i * 0.25);
  }

  function resetAllProgress() {
    totalCoins = 0; currentCarIndex = 0;
    carsConfig.forEach((c, i) => {
      c.unlocked = (i === 0);
      c.upgradeLevels = { engine: 0, tires: 0, fuel: 0 };
      c.stats = { engine: 1.0, tires: 1.0, fuel: 1.0 };
    });
    localStorage.removeItem('hcr_garage');
    resetCar(); updateAllDisplays(); updateGarageUI(); updateLevelButtons();
    alert('Прогресс сброшен!');
  }

  function checkAndUnlockNextCar() {
    let unlocked = false;
    for (let i = 0; i < carsConfig.length - 1; i++) {
      if (!carsConfig[i+1].unlocked && Object.keys(carsConfig[i].maxUpgrades).every(k => carsConfig[i].upgradeLevels[k] >= carsConfig[i].maxUpgrades[k])) {
        carsConfig[i+1].unlocked = true; unlocked = true;
      }
    }
    if (unlocked) { saveGameData(true); updateAllDisplays(); updateGarageUI(); }
  }

  function upgradePart(ci, part) {
    const c = carsConfig[ci];
    if (c.upgradeLevels[part] >= c.maxUpgrades[part]) return false;
    const cost = c.upgradeCosts[part][c.upgradeLevels[part] + 1];
    if (totalCoins >= cost) {
      totalCoins -= cost; c.upgradeLevels[part]++;
      recalculateCarStats(ci); saveGameData(true); checkAndUnlockNextCar();
      updateAllDisplays(); updateGarageUI();
      return true;
    }
    return false;
  }

  function getEnginePower() { return ENGINE_POWER * (carsConfig[currentCarIndex].stats.engine || 1.0); }

  function lockOrientation() {

  function toggleFullscreen() {
    const gameWrapper = document.getElementById('gameWrapper');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    
    if (!isFullscreen) {
      if (isMobile) {
        // Мобильный полноэкранный режим
        lockOrientation();
        gameWrapper.classList.add('fullscreen-mobile');
        isMobileFullscreen = true;
        
        // Скрываем внешние элементы
        document.querySelector('.menu-bar').style.display = 'none';
        document.querySelector('.level-select').style.display = 'none';
        document.querySelector('.info').style.display = 'none';
        document.querySelector('.controls-panel').style.display = 'none';
        
        fullscreenBtn.textContent = '✕';
        fullscreenBtn.title = 'Выйти';
        isFullscreen = true;
        
        // Показываем кнопки управления внутри game-wrapper
        document.getElementById('touchControls').style.display = 'block';
        
        // Оптимизируем размер канваса
        resizeMobileCanvas();
      } else {
        // ПК полноэкранный режим
        if (gameWrapper.requestFullscreen) gameWrapper.requestFullscreen();
        else if (gameWrapper.webkitRequestFullscreen) gameWrapper.webkitRequestFullscreen();
        gameWrapper.classList.add('fullscreen');
        fullscreenBtn.textContent = '✕';
        isFullscreen = true;
      }
    } else {
      if (isMobile) {
        // Выход из мобильного полноэкранного режима
        unlockOrientation();
        gameWrapper.classList.remove('fullscreen-mobile');
        isMobileFullscreen = false;
        
        // Показываем внешние элементы
        document.querySelector('.menu-bar').style.display = '';
        document.querySelector('.level-select').style.display = '';
        document.querySelector('.info').style.display = '';
        if (isMobile) document.querySelector('.controls-panel').style.display = 'none';
        else document.querySelector('.controls-panel').style.display = 'flex';
        
        fullscreenBtn.textContent = '⛶';
        fullscreenBtn.title = 'Полноэкранный режим';
        isFullscreen = false;
        
        // Скрываем кнопки внутри game-wrapper
        document.getElementById('touchControls').style.display = isMobile ? 'block' : 'none';
        
        canvas.width = W;
        canvas.height = H;
        canvas.style.width = '';
        canvas.style.height = '';
      } else {
        // Выход из ПК полноэкранного режима
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        gameWrapper.classList.remove('fullscreen');
        fullscreenBtn.textContent = '⛶';
        isFullscreen = false;
        canvas.width = W;
        canvas.height = H;
      }
    }
  }

  function resizeMobileCanvas() {
    if (!isMobileFullscreen) return;
    const gameWrapper = document.getElementById('gameWrapper');
    const maxWidth = gameWrapper.clientWidth;
    const maxHeight = gameWrapper.clientHeight;
    const ratio = W / H;
    
    let newWidth, newHeight;
    if (maxWidth / maxHeight > ratio) {
      newHeight = maxHeight;
      newWidth = newHeight * ratio;
    } else {
      newWidth = maxWidth;
      newHeight = newWidth / ratio;
    }
    
    canvas.style.width = newWidth + 'px';
    canvas.style.height = newHeight + 'px';
  }

  function handleFullscreenChange() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement && !isMobileFullscreen) {

      document.getElementById('fullscreenBtn').textContent = '⛶';
      isFullscreen = false;

    }
  }

  function generateTerrainForLevel(levelIndex){

  function generateEndlessTerrain(){
    terrainPoints.length=0; coins_list.length=0; fuelCans_list.length=0;
    levelConfig={terrain:"gentle",diff:5,jumps:0.8,fuel:60,fuelCans:3,coins:15};

  function generateTerrainSegment(startX,endX,config){
    const baseY=H*0.65, diff=config.diff, jumpPower=config.jumps, segLength=endX-startX, segSegments=Math.floor(segLength*1.5);
    const isHardLevel=diff>=11;
    const flatStart=isHardLevel?1200:700;
    const transitionEnd=isHardLevel?1800:1100;
    const transitionDrop=isHardLevel?6:15;
   
    for(let i=0;i<=segSegments;i++){
      const x=startX+(i/segSegments)*segLength;
      let y=baseY;
      if(x<flatStart) y=baseY;
      else if(x<transitionEnd&&startX===0){const t=(x-flatStart)/(transitionEnd-flatStart);y=baseY-(t*t*(3-2*t))*transitionDrop;}
      else{
        y+=Math.sin(x*0.0004)*50*jumpPower+Math.sin(x*0.0009+1.5)*55*jumpPower+Math.sin(x*0.0015+3)*40*jumpPower+Math.cos(x*0.0007+0.5)*45*jumpPower+Math.sin(x*0.002+1)*25*jumpPower;
        for(let r=flatStart+500;r<endX;r+=400+diff*15){const dist=Math.abs(x-r);if(dist<250)y-=Math.exp(-Math.pow(dist/150,2))*(60+diff*8)*jumpPower*(isHardLevel?0.5:1.0);}
        if(diff>=5){for(let d=flatStart+800;d<endX;d+=600){const dist=Math.abs(x-d);if(dist<350)y-=Math.exp(-Math.pow(dist/180,2))*(70+diff*10)*jumpPower*(isHardLevel?0.5:1.0);}}
        for(let b=flatStart+300;b<endX;b+=200+diff*10){const dist=Math.abs(x-b);if(dist<50)y-=Math.exp(-Math.pow(dist/30,2))*(20+diff*3)*jumpPower*(isHardLevel?0.4:1.0);}
      }
      if(terrainPoints.length>0){const prevY=terrainPoints[terrainPoints.length-1].y;const maxChange=isHardLevel?4+diff*0.5:8+diff*1.5;if(Math.abs(y-prevY)>maxChange)y=prevY+Math.sign(y-prevY)*maxChange;}
      y=Math.max(50,Math.min(H-25,y));
      terrainPoints.push({x,y});
    }
   
    if(startX===0){
      for(let i=0;i<(config.coins||15);i++){const cx=flatStart+100+(i/(config.coins||15))*(endX-flatStart-200);coins_list.push({x:cx,y:Math.max(40,getTerrainY(cx)-8-Math.random()*15),collected:false});}
      const fuelCount=config.fuelCans||3;
      if(fuelCount>0){const segment=(endX-flatStart-400)/(fuelCount+1);for(let i=0;i<fuelCount;i++){const fx=flatStart+200+(i+1)*segment+Math.random()*200;fuelCans_list.push({x:fx,y:getTerrainY(fx)-18,collected:false});}}
    }else{
      if(Math.random()<0.3){const cx=startX+Math.random()*segLength;coins_list.push({x:cx,y:Math.max(40,getTerrainY(cx)-8-Math.random()*15),collected:false});}
      if(Math.random()<0.06){const fx=startX+Math.random()*segLength;fuelCans_list.push({x:fx,y:getTerrainY(fx)-18,collected:false});}
    }
  }

  function getTerrainY(x){
    if(terrainPoints.length===0)return H*0.65;
    const cx=Math.max(0,Math.min(x,terrainPoints[terrainPoints.length-1].x));
    let lo=0,hi=terrainPoints.length-1;
    while(lo<hi-1){const mid=(lo+hi)>>1;if(terrainPoints[mid].x<=cx)lo=mid;else hi=mid;}
    const p0=terrainPoints[lo],p1=terrainPoints[Math.min(hi,terrainPoints.length-1)];
    return p1.x===p0.x?p0.y:p0.y+(p1.y-p0.y)*((cx-p0.x)/(p1.x-p0.x));
  }

  function getTerrainAngle(x){const dx=8;return Math.atan2(getTerrainY(x+dx)-getTerrainY(x-dx),dx*2);}
  function getDriverHeadPosition(){
    const hx=car.width*0.04,hy=-car.height*0.55;
    return{x:car.x+hx*Math.cos(car.angle)-hy*Math.sin(car.angle),y:car.y+hx*Math.sin(car.angle)+hy*Math.cos(car.angle)};
  }

  function startLevel(n){currentLevel=n;isEndless=false;generateTerrainForLevel(n-1);resetCar();document.getElementById('levelDisplay').textContent=n;updateAllDisplays();updateLevelButtons();}

  function resetCar(){

    car.x=200;car.y=gy-car.height*0.5;car.vx=0;car.vy=0;car.angle=0;car.angularVelocity=0;car.wheelRotation=0;car.onGround=true;

    car.wheel2.x=car.x+car.width*0.38;car.wheel2.y=gy;car.wheel2.onGround=true;car.wheel2.groundY=gy;
    gameOver=false;outOfFuel=false;levelComplete=false;gameStarted=false;distance=0;coins=0;
    fuel=getFuelCapacity();cameraX=0;particles=[];airTime=0;maxAirTime=0;
    coins_list.forEach(c=>c.collected=false);
    fuelCans_list.forEach(c=>c.collected=false);

    ['gameoverOverlay','outOfFuelOverlay','winOverlay'].forEach(id=>document.getElementById(id).classList.remove('active'));

  function spawnParticles(x,y,count,color,vel){
    for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-0.5)*(vel||4),vy:(Math.random()-0.5)*3-2,life:10+Math.random()*15,color,size:1.5+Math.random()*2.5});
  }

  function updateCar(){
    if(gameOver||outOfFuel||levelComplete)return;
    const enginePower=getEnginePower(), tireGrip=getTireGrip(), currentMaxSpeed=MAX_SPEED*tireGrip;
   
    if(Math.abs(car.vx)>0.1)fuel-=0.004+Math.abs(car.vx)*0.0025;else fuel-=0.0009;
    if(fuel<=0){fuel=0;outOfFuelEvent();return;}
    document.getElementById('fuelDisplay').textContent=Math.floor(fuel);
   
    if(isEndless&&car.x>generatedTerrainLength-3000){
      const ns=generatedTerrainLength,ne=generatedTerrainLength+5000;
      levelConfig.diff=Math.min(20,5+Math.floor(generatedTerrainLength/2000));
      levelConfig.jumps=Math.min(2.0,0.8+generatedTerrainLength/12000);
      generateTerrainSegment(ns,ne,levelConfig);generatedTerrainLength=ne;
    }
   
    const slope=getTerrainAngle(car.x),isGas=keys['ArrowRight']||keys['KeyD'],isBrake=keys['ArrowLeft']||keys['KeyA'];
    let ef=0;
    
    if(isGas){
      gameStarted=true;
      let pf=slope>0.15?Math.max(0.2,1.0-slope*1.7):1.0;
      let startFactor=1.0;
      if(Math.abs(car.vx)<2.0)startFactor=0.5+Math.abs(car.vx)*0.25;
      else if(Math.abs(car.vx)<5.0)startFactor=0.75+(Math.abs(car.vx)-2.0)*0.083;
      ef=enginePower*pf*startFactor;
    }
    if(isBrake){gameStarted=true;if(car.vx>0)ef=-BRAKE_POWER*tireGrip;}
    if(!isGas&&!isBrake&&car.onGround){if(car.vx>0.1)car.vx*=0.955;else if(car.vx>0)car.vx=0;}
   
    if(!car.onGround){
      if(keys['ArrowUp']||keys['KeyW'])car.angularVelocity-=0.025;
      if(keys['ArrowDown']||keys['KeyS'])car.angularVelocity+=0.025;
      car.angularVelocity*=0.997;airTime+=0.016;if(airTime>maxAirTime)maxAirTime=airTime;
    }else{
      airTime=0;
      car.angularVelocity+=(slope-car.angle)*0.05*tireGrip;
      car.angularVelocity*=0.9;
      if(car.vx>3){const drop=getTerrainY(car.x)-getTerrainY(car.x+car.vx*4);if(drop>8){car.vy-=drop*0.025*(levelConfig.jumps||0.8);if(drop>12)spawnParticles(car.x,getTerrainY(car.x),3,'#ffffff',3);}}
    }
   
    car.vx+=ef;car.vx*=AIR_FRICTION;car.vy+=GRAVITY;
    car.vx=Math.max(-MAX_REVERSE,Math.min(car.vx,currentMaxSpeed));
    car.angularVelocity=Math.max(-0.1,Math.min(car.angularVelocity,0.1))*0.97;
    car.angle+=car.angularVelocity;car.x+=car.vx;car.y+=car.vy;
   
    if(gameStarted&&getDriverHeadPosition().y>=getTerrainY(getDriverHeadPosition().x)-5){gameOverCrash();return;}
    if(!isEndless&&car.x>=finishLineX){completeLevel();return;}
   
    const hw=car.width*0.38,wb=car.height*0.28;
    car.wheel1.x=car.x-hw*Math.cos(car.angle)-wb*Math.sin(car.angle);
    car.wheel1.y=car.y-hw*Math.sin(car.angle)+wb*Math.cos(car.angle);
    car.wheel2.x=car.x+hw*Math.cos(car.angle)-wb*Math.sin(car.angle);
    car.wheel2.y=car.y+hw*Math.sin(car.angle)+wb*Math.cos(car.angle);
    car.wheel1.groundY=getTerrainY(car.wheel1.x);car.wheel2.groundY=getTerrainY(car.wheel2.x);
    car.wheel1.onGround=car.wheel1.y>=car.wheel1.groundY-2;
    car.wheel2.onGround=car.wheel2.y>=car.wheel2.groundY-2;
    const wog=car.onGround;car.onGround=car.wheel1.onGround||car.wheel2.onGround;
    
    [car.wheel1,car.wheel2].forEach(w=>{
      if(w.onGround&&w.y>w.groundY){
        const p=w.y-w.groundY;car.y-=p*0.3;
        if(car.vy>0)car.vy*=-0.2;
        if(p>5)spawnParticles(w.x,w.groundY,Math.floor(p),'#8B7355',p);
      }
    });
    
    if(wog&&!car.onGround&&gameStarted&&car.vx>3)spawnParticles(car.x,getTerrainY(car.x),4,'#ffff88',3);
    if(!wog&&car.onGround&&gameStarted&&Math.abs(car.vy)>3)spawnParticles(car.x,car.y,Math.floor(Math.abs(car.vy)*1.5),'#aa9977',Math.abs(car.vy));
   
    if(car.x<30){car.x=30;car.vx=Math.max(0,car.vx);}
    if(!isEndless&&car.x>TERRAIN_LENGTH-30)car.x=TERRAIN_LENGTH-30;
    car.wheelRotation+=car.vx*0.12;
    if(car.vx>0)distance+=car.vx*0.03;
    document.getElementById('speedDisplay').textContent=Math.abs(Math.floor(car.vx*8.5));
   
    coins_list.forEach(c=>{if(!c.collected&&Math.hypot(car.x-c.x,car.y-c.y)<28){c.collected=true;coins++;spawnParticles(c.x,c.y,5,'#ffd700',3);}});
    fuelCans_list.forEach(c=>{if(!c.collected&&Math.hypot(car.x-c.x,car.y-c.y)<28){c.collected=true;fuel=Math.min(getFuelCapacity(),fuel+25);spawnParticles(c.x,c.y,8,'#00ff00',4);document.getElementById('fuelDisplay').textContent=Math.floor(fuel);}});
    if(car.onGround&&Math.abs(car.vx)>2&&Math.random()<0.4)spawnParticles((car.vx>0?car.wheel1:car.wheel2).x,(car.vx>0?car.wheel1:car.wheel2).groundY,1,'#8B7355',2);
  }

  function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;if(p.life<=0)particles.splice(i,1);}}
  function updateCamera(){cameraX+=(car.x-W*0.35-cameraX)*0.06;cameraX=Math.max(0,cameraX);}

  function drawSky(){
    const cols={night:['#010104','#030308','#060610'],mars:['#200400','#3a0a00','#5a1500'],hell:['#020000','#050000','#0a0000'],volcano:['#0a0200','#180500','#2a0a00'],icy:['#607080','#708090','#8098a0'],sandy:['#805020','#906030','#a07040']}[(levelConfig||{}).terrain]||['#1a3050','#2a4060','#3a5070'];
    const g=ctx.createLinearGradient(0,0,0,H);cols.forEach((c,i)=>g.addColorStop(i/(cols.length-1),c));ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }

  function drawTerrain(){
    if(terrainPoints.length===0)return;
    const t=(levelConfig||{}).terrain,colors={sandy:{g:'#906030',s:'#a07040',d:'#704020'},rocky:{g:'#3a3a3a',s:'#4a4a4a',d:'#1a1a1a'},icy:{g:'#90a8c0',s:'#a0b8d0',d:'#7088a0'},forest:{g:'#120602',s:'#1a0a04',d:'#060200'},volcano:{g:'#120200',s:'#1a0500',d:'#060000'},night:{g:'#050508',s:'#08080c',d:'#020204'},mars:{g:'#5a1004',s:'#6a1808',d:'#3a0800'},hell:{g:'#060000',s:'#0a0000',d:'#010000'}}[t]||{g:'#1a3008',s:'#2a4010',d:'#0a2004'};
    ctx.fillStyle=colors.d;ctx.fillRect(0,0,W,H);
    ctx.fillStyle=colors.g;ctx.beginPath();ctx.moveTo(0,H);
    for(let i=0;i<terrainPoints.length;i++){const sx=terrainPoints[i].x-cameraX;if(sx<-50)continue;if(sx>W+50)break;ctx.lineTo(sx,terrainPoints[i].y);}
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
    ctx.strokeStyle=colors.s;ctx.lineWidth=2;ctx.beginPath();let started=false;
    for(let i=0;i<terrainPoints.length;i++){const sx=terrainPoints[i].x-cameraX;if(sx<-10)continue;if(sx>W+10)break;if(!started){ctx.moveTo(sx,terrainPoints[i].y);started=true;}else ctx.lineTo(sx,terrainPoints[i].y);}
    ctx.stroke();
    if(!isEndless){const fSX=finishLineX-cameraX;if(fSX>-50&&fSX<W+50){const fY=getTerrainY(finishLineX);ctx.fillStyle='#fff';ctx.fillRect(fSX-1,fY-30,3,30);ctx.fillStyle='#0f0';ctx.beginPath();ctx.moveTo(fSX,fY-30);ctx.lineTo(fSX+12,fY-26);ctx.lineTo(fSX,fY-22);ctx.fill();}}
  }

  function drawCoins(){coins_list.forEach(c=>{if(!c.collected){const sx=c.x-cameraX;if(sx<-20||sx>W+20)return;ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.arc(sx,c.y,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(sx,c.y,4,0,Math.PI*2);ctx.fill();}});}
  function drawFuelCans(){fuelCans_list.forEach(c=>{if(!c.collected){const sx=c.x-cameraX;if(sx<-20||sx>W+20)return;ctx.globalAlpha=fuel<15?0.4+Math.abs(Math.sin(Date.now()*0.01))*0.6:1;ctx.fillStyle='#ff0000';ctx.fillRect(sx-7,c.y-10,14,18);ctx.fillStyle='#fff';ctx.fillRect(sx-5,c.y-2,10,7);ctx.globalAlpha=1;}});}
  function drawParticles(){particles.forEach(p=>{const sx=p.x-cameraX;if(sx<-10||sx>W+10)return;ctx.fillStyle=p.color;ctx.globalAlpha=Math.min(1,p.life/14);ctx.beginPath();ctx.arc(sx,p.y,p.size,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}

  function drawCar(){
    const sx=car.x-cameraX,sy=car.y,w=car.width,h=car.height;
    ctx.save();ctx.translate(sx,sy);ctx.rotate(car.angle);
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(0,h*0.4,w*0.4,h*0.1,0,0,Math.PI*2);ctx.fill();
    const drawWheel=(wx,wy,rot,r)=>{
      ctx.save();ctx.translate(wx,wy);ctx.rotate(rot);
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#555';ctx.beginPath();ctx.arc(0,0,r*0.5,0,Math.PI*2);ctx.fill();
      ctx.restore();
    };
    switch(currentCarIndex){
      case 0:ctx.fillStyle='#ff3300';ctx.beginPath();ctx.moveTo(-w*0.4,-h*0.08);ctx.lineTo(-w*0.33,-h*0.38);ctx.lineTo(-w*0.08,-h*0.46);ctx.lineTo(w*0.08,-h*0.46);ctx.lineTo(w*0.28,-h*0.28);ctx.lineTo(w*0.38,-h*0.05);ctx.lineTo(w*0.4,h*0.26);ctx.lineTo(-w*0.4,h*0.26);ctx.closePath();ctx.fill();drawWheel(-w*0.26,h*0.26,car.wheelRotation,h*0.32);drawWheel(w*0.26,h*0.26,car.wheelRotation,h*0.32);break;
      case 1:ctx.fillStyle='#00aa00';ctx.beginPath();ctx.moveTo(-w*0.45,-h*0.0);ctx.lineTo(-w*0.38,-h*0.35);ctx.lineTo(-w*0.1,-h*0.5);ctx.lineTo(w*0.1,-h*0.5);ctx.lineTo(w*0.3,-h*0.25);ctx.lineTo(w*0.42,-h*0.0);ctx.lineTo(w*0.45,h*0.3);ctx.lineTo(-w*0.45,h*0.3);ctx.closePath();ctx.fill();drawWheel(-w*0.35,h*0.28,car.wheelRotation,h*0.38);drawWheel(w*0.35,h*0.28,car.wheelRotation,h*0.38);break;
      case 2:ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.moveTo(-w*0.35,-h*0.2);ctx.lineTo(-w*0.25,-h*0.5);ctx.lineTo(-w*0.05,-h*0.55);ctx.lineTo(w*0.1,-h*0.5);ctx.lineTo(w*0.35,-h*0.3);ctx.lineTo(w*0.38,-h*0.15);ctx.lineTo(w*0.35,h*0.2);ctx.lineTo(-w*0.35,h*0.2);ctx.closePath();ctx.fill();ctx.fillStyle='#333';ctx.fillRect(-w*0.4,-h*0.5,w*0.08,h*0.25);drawWheel(-w*0.28,h*0.22,car.wheelRotation,h*0.28);drawWheel(w*0.28,h*0.22,car.wheelRotation,h*0.28);break;
    }
    ctx.fillStyle='#111';ctx.beginPath();ctx.moveTo(-w*0.02,-h*0.43);ctx.lineTo(w*0.07,-h*0.43);ctx.lineTo(w*0.18,-h*0.2);ctx.lineTo(0,-h*0.2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#ffcc80';ctx.beginPath();ctx.arc(w*0.04,-h*0.55,h*0.18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(w*0.04,-h*0.58,h*0.18,Math.PI,0);ctx.fill();
    ctx.restore();
  }

  function drawUI(){
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,36);
    ctx.fillStyle='#ffaa00';ctx.font='bold 12px Arial';ctx.fillText(`💰 ${coins}`,8,25);
    ctx.fillStyle='#fff';ctx.font='bold 12px Arial';ctx.textAlign='center';
    ctx.fillText(`📏 ${isEndless?Math.floor(distance)+'м':Math.floor(distance)+'м / '+Math.floor(TERRAIN_LENGTH)+'м'}`,W/2,25);ctx.textAlign='start';
    const fX=W-130,fY=6;ctx.fillStyle='#111';ctx.fillRect(fX,fY,118,22);
    const fW=114*(fuel/getFuelCapacity());
    ctx.fillStyle=fuel<15?'#f00':fuel<30?'#f60':'#0c0';ctx.fillRect(fX+2,fY+2,fW,18);
    ctx.fillStyle='#fff';ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.fillText(`⛽${Math.floor(fuel)}%`,fX+59,fY+15);ctx.textAlign='start';
    if(!car.onGround&&airTime>0.3){ctx.fillStyle='#ff0';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.fillText(`🛫 ${airTime.toFixed(1)}с`,W/2,H-8);ctx.textAlign='start';}
    if(fuel<10&&fuel>0&&Math.sin(Date.now()*0.01)>0){ctx.fillStyle='#f00';ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.fillText('⚠️ ТОПЛИВО!',W/2,H-25);ctx.textAlign='start';}
    if(!gameStarted){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(W/2-80,H/2-16,160,32);ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.fillText('→ СТАРТ',W/2,H/2+4);ctx.textAlign='start';}
    if(car.y<-100&&gameStarted){ctx.fillStyle='#ff0';ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.fillText('🚀 ВЫСОКИЙ ПОЛЁТ!',W/2,50);ctx.textAlign='start';}
    if(car.y>H+100&&gameStarted){ctx.fillStyle='#f00';ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.fillText('⚠️ НИЗКО!',W/2,H-50);ctx.textAlign='start';}
  }

  // ===== ГАРАЖ =====
  function openGarage(){updateGarageUI();document.getElementById('garageOverlay').classList.add('active');}
  function closeGarage(){document.getElementById('garageOverlay').classList.remove('active');saveGameData(true);updateAllDisplays();}
  function selectCar(index){if(!carsConfig[index].unlocked)return;currentCarIndex=index;saveGameData(true);resetCar();updateGarageUI();updateAllDisplays();}
  function upgradeCarPart(part){if(upgradePart(currentCarIndex,part)){updateGarageUI();updateAllDisplays();resetCar();}else alert('Недостаточно монет!');}

  function updateGarageUI(){
    document.getElementById('garageCoins').textContent=totalCoins;
    document.getElementById('carsRow').innerHTML=carsConfig.map((car,index)=>`
      <div class="car-card${index===currentCarIndex?' selected':''}${!car.unlocked?' locked':''}"${car.unlocked?` onclick="window.selectCar(${index})"`:''}>
        <div class="car-icon">${car.icon}</div>
        <div class="car-name">${car.name}</div>
        <div class="car-desc">${car.desc}</div>
        ${!car.unlocked?`<div class="car-lock">🔒</div><div class="car-desc" style="color:#ff4400;font-size:0.6rem;">Прокачайте ${carsConfig[index-1]?.name||''}</div>`:''}
      </div>`).join('');
   
    const currentCar=carsConfig[currentCarIndex];
    document.getElementById('upgradesList').innerHTML=[
      {id:'engine',name:'🏎️ Двигатель',desc:'Увеличивает мощность'},
      {id:'tires',name:'🛞 Шины',desc:'Улучшает сцепление'},
      {id:'fuel',name:'⛽ Бак',desc:'Запас топлива'}
    ].map(part=>{
      const lvl=currentCar.upgradeLevels[part.id],max=currentCar.maxUpgrades[part.id],maxed=lvl>=max;
      return `<div class="upgrade-item">
        <div class="upgrade-info">
          <div class="upgrade-name">${part.name} - ${part.desc}</div>
          <div class="upgrade-level">Уровень ${lvl}/${max}</div>
          <div class="upgrade-bar"><div class="upgrade-fill" style="width:${(lvl/max)*100}%"></div></div>
        </div>
        <button class="upgrade-btn${maxed?' maxed':''}"${maxed?' disabled':''} onclick="window.upgradePartHandler('${part.id}')">${maxed?'✅ Макс':`💰 ${currentCar.upgradeCosts[part.id][lvl+1]}`}</button>
      </div>`;
    }).join('');
   
    const cs=document.getElementById('carStatus');
    if(currentCarIndex<carsConfig.length-1){
      const nc=carsConfig[currentCarIndex+1];
      cs.textContent=nc.unlocked?`✅ ${nc.name} разблокирован!`:`🔒 Прокачайте всё для ${nc.name}`;
      cs.style.color=nc.unlocked?'#00ff00':'#ff4400';
    }else{cs.textContent='🏆 Все машины открыты!';cs.style.color='#ffd700';}
  }

  function updateAllDisplays(){
    document.getElementById('totalCoinsDisplay').textContent=totalCoins;
    document.getElementById('currentCarDisplay').textContent=carsConfig[currentCarIndex].name;
    document.getElementById('fuelDisplay').textContent=Math.floor(fuel);
    document.getElementById('speedDisplay').textContent=Math.abs(Math.floor(car.vx*8.5));
    if(!isEndless)document.getElementById('levelDisplay').textContent=currentLevel;
    if(document.getElementById('garageOverlay').classList.contains('active'))updateGarageUI();
  }

  window.selectCar=selectCar;
  window.upgradePartHandler=upgradeCarPart;

  function updateLevelButtons(){
    const container=document.getElementById('levelButtons');container.innerHTML='';
    for(let i=1;i<=20;i++){const btn=document.createElement('button');btn.className='level-btn'+(i===currentLevel&&!isEndless?' active':'');btn.textContent=i;btn.title=levelConfigs[i-1].name;btn.onclick=()=>startLevel(i);container.appendChild(btn);}
    const eb=document.createElement('button');eb.className='level-btn endless'+(isEndless?' active':'');eb.textContent='♾️';eb.title='Бесконечный режим';eb.onclick=startEndless;container.appendChild(eb);
  }

  function render(){ctx.clearRect(0,0,W,H);drawSky();drawTerrain();drawCoins();drawFuelCans();drawParticles();drawCar();drawUI();}
  function gameLoop(){updateCar();updateParticles();updateCamera();render();requestAnimationFrame(gameLoop);}

  window.addEventListener('beforeunload',()=>saveGameData(true));
  document.addEventListener('visibilitychange',()=>{if(document.hidden)saveGameData(true);});
  document.addEventListener('fullscreenchange',handleFullscreenChange);
  document.addEventListener('webkitfullscreenchange',handleFullscreenChange);
  window.addEventListener('resize',()=>{if(isMobileFullscreen)resizeMobileCanvas();});
  window.addEventListener('orientationchange',()=>{if(isMobileFullscreen)setTimeout(resizeMobileCanvas,300);});
  setInterval(()=>{if(!gameOver&&!outOfFuel&&!levelComplete&&gameStarted)saveGameData(false);},30000);

  window.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='KeyR')resetCar();if(e.code==='KeyF')toggleFullscreen();e.preventDefault();});
  window.addEventListener('keyup',e=>{keys[e.code]=false;e.preventDefault();});
 
  function setupBtn(id,code){
    const btn=document.getElementById(id);
    if(!btn)return;
    btn.addEventListener('pointerdown',e=>{e.preventDefault();keys[code]=true;});
    btn.addEventListener('pointerup',e=>{e.preventDefault();keys[code]=false;});
    btn.addEventListener('pointerleave',()=>{keys[code]=false;});
    btn.addEventListener('pointercancel',()=>{keys[code]=false;});
    btn.addEventListener('contextmenu',e=>e.preventDefault());
  }
  setupBtn('btnGas','ArrowRight');
  setupBtn('btnBrake','ArrowLeft');
  setupBtn('btnTiltUp','ArrowUp');
  setupBtn('btnTiltDown','ArrowDown');
 
  document.getElementById('restartBtn').addEventListener('click',resetCar);
  document.getElementById('fuelRestartBtn').addEventListener('click',resetCar);
  document.getElementById('winRestartBtn').addEventListener('click',resetCar);
  document.getElementById('nextLevelBtn').addEventListener('click',()=>{if(currentLevel<20)startLevel(currentLevel+1);});
  document.getElementById('openGarageBtn').addEventListener('click',openGarage);
  document.getElementById('closeGarageBtn').addEventListener('click',closeGarage);
  document.getElementById('fullscreenBtn').addEventListener('click',toggleFullscreen);
  document.getElementById('resetProgressBtn').addEventListener('click',()=>document.getElementById('resetConfirmOverlay').classList.add('active'));
  document.getElementById('confirmResetBtn').addEventListener('click',()=>{resetAllProgress();document.getElementById('resetConfirmOverlay').classList.remove('active');});
  document.getElementById('cancelResetBtn').addEventListener('click',()=>document.getElementById('resetConfirmOverlay').classList.remove('active'));

  // Инициализация
  loadGameData();
  generateTerrainForLevel(0);
  resetCar();
  updateAllDisplays();
  updateLevelButtons();
  gameLoop();
 
  console.log('🚗 Hill Climb Racing v2.1 - Полноэкранный режим с кнопками поверх игры');
  console.log('  - На телефоне: горизонтальный фулскрин + кнопки внутри игры');
  console.log('  - На ПК: обычный полноэкранный режим');
  console.log('  - Скорость: ~80 км/ч');
})();
</script>
</body>
</html>
